AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  PRISM Async Backend Services - AWS SAM Application.
  Coordinates heavy async background jobs including source scans, Bedrock AI extraction, and Markdown exports.

Parameters:
  Environment:
    Type: String
    Default: dev
    Description: Environment name mapping to Amplify Gen 2 dynamic stacks (e.g., dev, prod, sandbox-dom).
  AlertEmail:
    Type: String
    Default: dom@example.com
    Description: Email address that receives instant alerts when the Daily AI Ingestion limit is exceeded.
  DailyAiLimit:
    Type: Number
    Default: 150
    Description: Daily cap on Bedrock AI assessments to prevent runaway model expenses.
  BedrockModelId:
    Type: String
    Default: anthropic.claude-3-haiku-20240307
    Description: Amazon Bedrock Foundation Model ID to use for routine article summaries and metadata suggestion.

Globals:
  Function:
    Timeout: 300
    MemorySize: 256
    Runtime: python3.11
    LoggingConfig:
      LogFormat: JSON

Resources:
  # Simple Notification Service Topic for Billing & Ingestion alerts
  AlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: "PRISM-AI-Alerts"
      Subscription:
        - Endpoint: !Ref AlertEmail
          Protocol: email

  # Ingestion Service Lambda (Scraper worker)
  IngestionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ingestion/
      Handler: app.lambda_handler
      Description: Periodically scans active source definitions, parses news pages, and saves raw material.
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          APP_NAME: prism
      Policies:
        - Version: '2012-10-17'
          Statement:
            # Grants read access to Amplify Gen 2 dynamic table parameters in SSM Parameter Store
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParameters
                - ssm:GetParametersByPath
              Resource:
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/amplify/prism/${Environment}/*'
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/amplify/*'
            # Grants read access to list AppSync APIs & list DynamoDB tables to resolve dynamic table suffixes
            - Effect: Allow
              Action:
                - appsync:ListGraphqlApis
                - dynamodb:ListTables
              Resource: '*'
            # Grants read/write access to all DynamoDB tables in the region to support sandbox deployments
            - Effect: Allow
              Action:
                - dynamodb:Query
                - dynamodb:Scan
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
                - dynamodb:BatchWriteItem
              Resource: !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/*'
      Events:
        HourlyScanSchedule:
          Type: Schedule
          Properties:
            Schedule: 'rate(1 hour)'
            Description: Triggers the source definitions crawler loop every 60 minutes.
            Enabled: true

  # Assessment Service Lambda (Bedrock AI worker)
  AssessmentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: assessment/
      Handler: app.lambda_handler
      Description: Processes newly DISCOVERED SourceItems, executes Bedrock Claude, and drafts curated KnowledgeItems.
      ReservedConcurrentExecutions: 2  # Concurrency throttle to prevent LLM cost spikes
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          APP_NAME: prism
          DAILY_AI_LIMIT: !Ref DailyAiLimit
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          ALERTS_SNS_TOPIC_ARN: !Ref AlertsTopic
      Policies:
        - Version: '2012-10-17'
          Statement:
            # Dynamic SSM table lookup permission
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParameters
                - ssm:GetParametersByPath
              Resource:
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/amplify/prism/${Environment}/*'
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/amplify/*'
            # Grants read access to list AppSync APIs & list DynamoDB tables to resolve dynamic table suffixes
            - Effect: Allow
              Action:
                - appsync:ListGraphqlApis
                - dynamodb:ListTables
              Resource: '*'
            # DynamoDB read/write permission
            - Effect: Allow
              Action:
                - dynamodb:Query
                - dynamodb:Scan
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
                - dynamodb:BatchWriteItem
              Resource: !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/*'
            # Amazon Bedrock Invocation permission
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/${BedrockModelId}'
            # SNS Alert Publishing permission
            - Effect: Allow
              Action:
                - sns:Publish
              Resource: !Ref AlertsTopic
      Events:
        # Periodic 5-minute sweep triggers Ingestion Assessment safely, avoiding cross-stack CDK stream errors
        FiveMinuteSweepSchedule:
          Type: Schedule
          Properties:
            Schedule: 'rate(5 minutes)'
            Description: Triggers a sweep for newly discovered source materials to process via Bedrock AI.
            Enabled: true

Outputs:
  IngestionFunctionArn:
    Description: "Ingestion Lambda Function ARN"
    Value: !GetAtt IngestionFunction.Arn
  AssessmentFunctionArn:
    Description: "Assessment Lambda Function ARN"
    Value: !GetAtt AssessmentFunction.Arn
  AlertsTopicArn:
    Description: "SNS Alerts Topic ARN"
    Value: !Ref AlertsTopic
